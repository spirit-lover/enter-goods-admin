version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: enterprise-goods-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enterprise_goods_admin
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
  redis:
    image: redis:7.4
    container_name: enterprise-goods-admin-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
volumes:
  mysql-data:
  redis-data:
